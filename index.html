<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lego game joiner</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #a8d8f0 0%, #3a8fc7 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 32px;
    width: 360px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }
  h1 { font-size: 20px; margin-bottom: 20px; color: #1a1a1a; }
  label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 14px;
    outline: none;
  }
  input:focus { border-color: #3a8fc7; }
  button {
    width: 100%;
    padding: 11px;
    background: #3a8fc7;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
  }
  button:hover { background: #2d7ab0; }
  #status { margin-top: 12px; font-size: 13px; color: #e53; min-height: 18px; }
  #status.ok { color: #2a9d5c; }
</style>
</head>
<body>
<div class="card">
  <h1>Roblox Server Joiner</h1>
  <label>Place ID</label>
  <input id="placeId" placeholder="142823291" />
  <label>Game Instance ID</label>
  <input id="instanceId" placeholder="1c94d78b-6a62-4fa4-b439-c3aeaf1ef316" />
  <button onclick="join()">Join</button>
  <div id="status"></div>
</div>
<script>
const params = new URLSearchParams(location.search)
if (params.get('PlaceId')) document.getElementById('placeId').value = params.get('PlaceId')
if (params.get('GameInstanceId')) document.getElementById('instanceId').value = params.get('GameInstanceId')

const join = () => {
  const PLACE = document.getElementById('placeId').value.trim()
  const INST = document.getElementById('instanceId').value.trim()
  const STATUS = document.getElementById('status')

  if (!PLACE || !INST) { STATUS.textContent = 'fill in both fields'; STATUS.className = ''; return }

  location.href = `roblox://experiences/start?placeId=${PLACE}&gameInstanceId=${INST}`
  STATUS.textContent = 'opening roblox...'
  STATUS.className = 'ok'
}

if (params.get('PlaceId') && params.get('GameInstanceId')) join()
</script>
</body>
</html>
